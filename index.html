<!DOCTYPE html>
<html>
<head>
<title>Prescript Terminal</title>

<style>
body {
    background: #050510;
    color: #00c3ff;
    font-family: monospace;
    text-align: center;
    margin-top: 80px;
}

h1 {
    letter-spacing: 5px;
}

button {
    padding: 12px 25px;
    border: 2px solid #00c3ff;
    background: transparent;
    color: #00c3ff;
    cursor: pointer;
    margin: 10px;
}

button:hover {
    background: #00c3ff;
    color: black;
}

#output {
    margin-top: 40px;
    font-size: 24px;
    min-height: 50px;
}

#stats {
    margin-top: 30px;
    font-size: 18px;
}
</style>
</head>

<body>

<h1>PRESCRIPT TERMINAL</h1>

<button onclick="generate()">RECEIVE ORDER</button>
<button onclick="complete()">TASK COMPLETED</button>

<div id="output">Awaiting directive...</div>
<div id="stats"></div>

<script>

// =========================
// PRESCRIPTS (UPGRADED)
// =========================
const prescripts = [
"Perform 20 push-ups without stopping.",
"Hold a plank for 60 seconds.",
"Do 40 jumping jacks at full effort.",
"Hold a wall sit for 60 seconds.",
"Walk outside for 10 minutes without your phone.",
"Do 30 squats with control.",
"Run in place for 90 seconds.",
"Stretch your entire body for 3 minutes.",
"Perform 10 slow push-ups with perfect form.",
"Climb stairs continuously for 3 minutes.",

"Drink two full glasses of water immediately.",
"Take a cold water splash to your face.",
"Step outside regardless of comfort.",
"Stand upright with perfect posture for 3 minutes.",
"Reset your physical state completely.",
"Move your body continuously for 3 minutes.",
"Stay standing instead of sitting for 5 minutes.",

"Clean a space completely—not partially.",
"Organize your entire desk with intention.",
"Remove 10 unnecessary items from your space.",
"Fix something you’ve been ignoring.",
"Reset your environment to a higher standard.",
"Take responsibility for your surroundings.",

"Send a message you’ve been avoiding.",
"Compliment someone without hesitation.",
"Start a conversation instead of waiting.",
"Check on someone you’ve neglected.",
"Say something honest instead of comfortable.",
"Offer help even if it feels awkward.",
"Listen fully without interrupting.",

"Start the task you’ve been putting off the most.",
"Work for 15 minutes without distraction.",
"Finish something you previously abandoned.",
"Write down exactly what you’ve been avoiding.",
"Break a difficult task into steps and begin.",
"Commit to action instead of thinking.",
"Remove all distractions for the next 15 minutes.",

"Stop scrolling immediately and do nothing for 60 seconds.",
"Sit in silence without stimulation.",
"Hold your focus on one thought.",
"Interrupt a negative thought pattern.",
"Choose discipline over comfort.",
"Act even if you don’t feel ready.",
"Do not negotiate with distraction.",
"Control your next action deliberately.",

"Stand up immediately.",
"Fix your posture.",
"Move now.",
"Act without delay.",
"Maintain discipline.",
"Proceed."
];

// =========================
// COMPLETION RESPONSES
// =========================
const compliments = [
"Directive fulfilled. Alignment maintained.",
"Compliance recorded. Continue.",
"Momentum acknowledged.",
"Execution accepted.",
"Discipline strengthens.",
"The chain remains unbroken.",
"Another step toward refinement.",

"‘I can do all things through Him who strengthens me.’ – Philippians 4:13",
"‘Do not grow weary in doing good.’ – Galatians 6:9",
"‘Be strong and courageous.’ – Joshua 1:9",
"‘The Lord gives strength.’ – Psalm 29:11",
"‘Commit your work to the Lord.’ – Proverbs 16:3",
"‘With God all things are possible.’ – Matthew 19:26"
];

// =========================
// STORAGE
// =========================
let streak = parseInt(localStorage.getItem("streak")) || 0;
let total = parseInt(localStorage.getItem("total")) || 0;
let lastTaskTime = parseInt(localStorage.getItem("taskTime")) || 0;

// =========================
// SOUND SYSTEM
// =========================
function playSound(freq) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.connect(ctx.destination);
    osc.start();
    setTimeout(() => osc.stop(), 120);
}

// =========================
// RANK SYSTEM
// =========================
function getRank(total) {
    if (total >= 50) return "ARCHON";
    if (total >= 30) return "EXECUTOR";
    if (total >= 15) return "DISCIPLE";
    if (total >= 5) return "INITIATE";
    return "UNASSIGNED";
}

// =========================
// UPDATE UI
// =========================
function updateStats() {
    document.getElementById("stats").innerText =
        "Streak: " + streak +
        " | Total: " + total +
        " | Rank: " + getRank(total);
}

// =========================
// GLITCH TEXT
// =========================
const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

function glitchText(text) {
    let output = document.getElementById("output");
    let i = 0;

    let interval = setInterval(() => {
        let str = "";
        for (let j = 0; j < text.length; j++) {
            str += j < i ? text[j] : chars[Math.floor(Math.random()*chars.length)];
        }
        output.innerText = str;

        if (i >= text.length) {
            clearInterval(interval);
            output.innerText = text;
        }
        i += 0.5;
    }, 25);
}

// =========================
// GENERATE
// =========================
function generate() {
    const task = prescripts[Math.floor(Math.random()*prescripts.length)];
    glitchText(task);

    lastTaskTime = Date.now();
    localStorage.setItem("taskTime", lastTaskTime);

    playSound(400);
}

// =========================
// COMPLETE
// =========================
function complete() {
    if (!lastTaskTime) return;

    let now = Date.now();
    let hours = (now - lastTaskTime) / (1000 * 60 * 60);

    if (hours > 12) {
        glitchText("FAILURE TO COMPLY.");
        streak = 0;
        playSound(100);
    } else {
        const msg = compliments[Math.floor(Math.random()*compliments.length)];
        glitchText(msg);

        streak++;
        total++;

        playSound(800);
    }

    localStorage.setItem("streak", streak);
    localStorage.setItem("total", total);

    updateStats();
}

// INIT
updateStats();

</script>

</body>
</html>
